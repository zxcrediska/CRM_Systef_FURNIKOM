<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - CRM ФУРНИКОМ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            max-width: 400px;
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-12 login-card">
                <div class="card shadow-lg">
                    <div class="card-body p-5">
                        <h3 class="text-center mb-4">CRM ФУРНИКОМ</h3>
                        <h5 class="text-center text-muted mb-4">Вход в систему</h5>

                        {% if form.errors %}
                        <div class="alert alert-danger" role="alert">
                            Неверный логин или пароль
                        </div>
                        {% endif %}

                        <form method="post">
                            {% csrf_token %}
                            <div class="mb-3">
                                <label for="id_username" class="form-label">Логин</label>
                                <input type="text" class="form-control form-control-lg"
                                       id="id_username" name="username" required autofocus>
                            </div>
                            <div class="mb-4">
                                <label for="id_password" class="form-label">Пароль</label>
                                <input type="password" class="form-control form-control-lg"
                                       id="id_password" name="password" required>
                            </div>
                            <button type="submit" class="btn btn-primary btn-lg w-100">
                                Войти
                            </button>
                        </form>

                        <div class="text-center mt-4">
                            <small class="text-muted">
                                CRM-система для ООО "ФУРНИКОМ"<br>
                                г. Барнаул, 2026
                            </small>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
