<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM ФУРНИКОМ - {% block title %}{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body {
            padding-top: 56px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        .navbar-brand {
            font-weight: 600;
            font-size: 1.25rem;
        }
        .sidebar {
            position: fixed;
            top: 56px;
            bottom: 0;
            left: 0;
            z-index: 100;
            padding: 48px 0 0;
            box-shadow: inset -1px 0 0 rgba(0, 0, 0, .1);
            background-color: #f8f9fa;
        }
        .sidebar-sticky {
            position: relative;
            top: 0;
            height: calc(100vh - 48px);
            padding-top: .5rem;
            overflow-x: hidden;
            overflow-y: auto;
        }
        .sidebar .nav-link {
            font-weight: 500;
            color: #333;
            padding: 0.75rem 1rem;
            margin: 0.25rem 0.5rem;
            border-radius: 0.25rem;
        }
        .sidebar .nav-link:hover {
            background-color: #e9ecef;
        }
        .sidebar .nav-link.active {
            color: #0d6efd;
            background-color: rgba(13, 110, 253, 0.1);
        }
        .sidebar .nav-link i {
            margin-right: 0.5rem;
        }
        main {
            padding: 2rem 0;
        }
        .card {
            border: none;
            box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075);
            margin-bottom: 1.5rem;
        }
        .stats-card {
            padding: 1.5rem;
            border-radius: 0.5rem;
        }
        .stats-card h5 {
            font-size: 0.875rem;
            color: #6c757d;
            margin-bottom: 0.5rem;
        }
        .stats-card .display-4 {
            font-size: 2rem;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <!-- Навигационная панель -->
    <nav class="navbar navbar-dark bg-dark fixed-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="{% url 'crm:dashboard' %}">
                <i class="bi bi-briefcase-fill"></i> CRM ФУРНИКОМ
            </a>
                <div class="d-flex align-items-center">
                    <span class="navbar-text text-white me-3">
                        <i class="bi bi-person-circle"></i> {{ user.get_full_name|default:user.username }}
                    </span>
                    <form method="post" action="{% url 'logout' %}" style="display: inline;">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-outline-light btn-sm">
                            <i class="bi bi-box-arrow-right"></i> Выход
                        </button>
                    </form>
                </div>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="row">
            <!-- Боковое меню -->
            <nav class="col-md-2 d-md-block sidebar">
                <div class="sidebar-sticky">
                    <ul class="nav flex-column">
                        <li class="nav-item">
                            <a class="nav-link {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}"
                               href="{% url 'crm:dashboard' %}">
                                <i class="bi bi-speedometer2"></i> Панель управления
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link {% if 'deals' in request.path %}active{% endif %}"
                               href="{% url 'crm:deals_list' %}">
                                <i class="bi bi-kanban"></i> Сделки
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link {% if 'clients' in request.path %}active{% endif %}"
                               href="{% url 'crm:clients_list' %}">
                                <i class="bi bi-people"></i> Клиенты
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link {% if 'tasks' in request.path %}active{% endif %}"
                               href="{% url 'crm:tasks_list' %}">
                                <i class="bi bi-check2-square"></i> Задачи
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="{% url 'crm:create_lead_from_email' %}">
                                <i class="bi bi-envelope-plus"></i> Заявка из Email
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/admin/">
                                <i class="bi bi-gear"></i> Администрирование
                            </a>
                        </li>
                    </ul>
                </div>
            </nav>

            <!-- Основной контент -->
            <main class="col-md-10 ms-sm-auto px-md-4">
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
